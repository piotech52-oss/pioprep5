<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            color: #495057;
        }

        tr:hover {
            background-color: #f8f9fa;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .user-cell {
            display: flex;
            align-items: center;
        }

        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status.active {
            background-color: #d4edda;
            color: #155724;
        }

        .status.inactive {
            background-color: #f8d7da;
            color: #721c24;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .role-student {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .role-admin {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 5px;
        }

        .btn-view {
            background-color: #007bff;
            color: white;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #2d3748;
        }

        .stat-card p {
            color: #4a5568;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .table-container {
                padding: 15px;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 User Management</h1>
            <p>Manage and view all registered users</p>
        </div>

        <div class="table-container">
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
                <div class="stat-card">
                    <h3 id="activeUsers">0</h3>
                    <p>Active Users</p>
                </div>
                <div class="stat-card">
                    <h3 id="studentsCount">0</h3>
                    <p>Students</p>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search users by name, email, or role...">
                <button onclick="searchUsers()">Search</button>
            </div>

            <div class="filters">
                <select id="roleFilter" class="filter-select" onchange="filterUsers()">
                    <option value="">All Roles</option>
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
                <select id="statusFilter" class="filter-select" onchange="filterUsers()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>

            <table id="usersTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sample user data based on your table structure
        const users = [
            {
                id: 1,
                userName: "piotech52",
                email: "piotech52@gmail.com",
                password: "$2b$10$OkPhw9FzxtcLyxPLrDTUJ...",
                role: "student",
                is_activated: 1,
                created_at: "2026-01-06 23:19:23",
                activation_code: "994927"
            },
            {
                id: 2,
                userName: "john_doe",
                email: "john@example.com",
                password: "$2b$10$hashedpassword123...",
                role: "admin",
                is_activated: 1,
                created_at: "2026-01-05 14:30:45",
                activation_code: "123456"
            },
            {
                id: 3,
                userName: "jane_smith",
                email: "jane@example.com",
                password: "$2b$10$anotherhash456...",
                role: "student",
                is_activated: 0,
                created_at: "2026-01-04 09:15:22",
                activation_code: "789012"
            }
        ];

        // Initialize users in localStorage if not present
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function loadUsers() {
            const storedUsers = JSON.parse(localStorage.getItem('users'));
            const tableBody = document.getElementById('usersTableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const roleFilter = document.getElementById('roleFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            tableBody.innerHTML = '';
            
            const filteredUsers = storedUsers.filter(user => {
                const matchesSearch = 
                    user.userName.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm) ||
                    user.role.toLowerCase().includes(searchTerm);
                
                const matchesRole = !roleFilter || user.role === roleFilter;
                const matchesStatus = !statusFilter || 
                    (statusFilter === 'active' ? user.is_activated === 1 : user.is_activated === 0);
                
                return matchesSearch && matchesRole && matchesStatus;
            });

            // Update statistics
            updateStats(storedUsers);
            
            filteredUsers.forEach(user => {
                const row = document.createElement('tr');
                row.onclick = () => viewUser(user.id);
                
                // Get initials for avatar
                const initials = user.userName.charAt(0).toUpperCase();
                
                row.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar">${initials}</div>
                            ${user.userName}
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td>
                        <span class="role-badge role-${user.role}">
                            ${user.role.charAt(0).toUpperCase() + user.role.slice(1)}
                        </span>
                    </td>
                    <td>
                        <span class="status ${user.is_activated ? 'active' : 'inactive'}">
                            ${user.is_activated ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>${formatDate(user.created_at)}</td>
                    <td>
                        <button class="action-btn btn-view" onclick="event.stopPropagation(); viewUser(${user.id})">View</button>
                        <button class="action-btn btn-delete" onclick="event.stopPropagation(); deleteUser(${user.id})">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateStats(allUsers) {
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('activeUsers').textContent = allUsers.filter(u => u.is_activated === 1).length;
            document.getElementById('studentsCount').textContent = allUsers.filter(u => u.role === 'student').length;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function searchUsers() {
            loadUsers();
        }

        function filterUsers() {
            loadUsers();
        }

        function viewUser(userId) {
            localStorage.setItem('currentUser', userId);
            window.open('user_details.html', '_blank');
        }

        function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                let storedUsers = JSON.parse(localStorage.getItem('users'));
                storedUsers = storedUsers.filter(user => user.id !== userId);
                localStorage.setItem('users', JSON.stringify(storedUsers));
                loadUsers();
            }
        }

        // Initial load
        loadUsers();

        // Auto-refresh every 5 seconds
        setInterval(loadUsers, 5000);
    </script>
</body>
</html>
