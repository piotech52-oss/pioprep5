<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .user-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .user-info {
            text-align: center;
            color: white;
        }

        .user-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .user-info .email {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .status-active {
            background-color: #4CAF50;
        }

        .status-inactive {
            background-color: #f44336;
        }

        .content {
            padding: 40px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .detail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .detail-card h3 {
            color: #495057;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .detail-card p {
            color: #2d3748;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .role-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .role-student {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .role-admin {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-deactivate {
            background: #ff9800;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .password-section {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border-left: 5px solid #ffc107;
        }

        .password-section h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .password-field {
            font-family: monospace;
            background: white;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            color: #495057;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .user-info h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="user-avatar-large" id="userAvatar">U</div>
            <div class="user-info">
                <h1 id="userName">Loading...</h1>
                <p class="email" id="userEmail">Loading...</p>
                <span class="status-badge status-active" id="userStatus">Active</span>
            </div>
        </div>

        <div class="content">
            <div class="details-grid">
                <div class="detail-card">
                    <h3>User ID</h3>
                    <p id="userId">-</p>
                </div>
                <div class="detail-card">
                    <h3>Role</h3>
                    <p><span class="role-badge role-student" id="userRole">Loading...</span></p>
                </div>
                <div class="detail-card">
                    <h3>Created At</h3>
                    <p id="createdAt">-</p>
                </div>
                <div class="detail-card">
                    <h3>Last Updated</h3>
                    <p id="lastUpdated">-</p>
                </div>
            </div>

            <div class="password-section">
                <h3>🔒 Password Hash</h3>
                <div class="password-field" id="passwordHash">Loading...</div>
                <p style="color: #856404; font-size: 0.9rem; margin-top: 10px;">
                    Note: This is the hashed password for security purposes
                </p>
            </div>

            <div class="actions">
                <button class="action-btn btn-edit" onclick="editUser()">
                    <span>✏️</span> Edit User
                </button>
                <button class="action-btn btn-deactivate" onclick="toggleActivation()">
                    <span>🔄</span> Toggle Activation
                </button>
                <button class="action-btn btn-delete" onclick="deleteUser()">
                    <span>🗑️</span> Delete User
                </button>
            </div>
        </div>
    </div>

    <script>
        // Get user ID from localStorage
        const userId = localStorage.getItem('currentUser');
        
        if (!userId) {
            alert('No user selected! Redirecting to user list...');
            window.location.href = 'user_list.html';
        }

        function loadUserDetails() {
            const storedUsers = JSON.parse(localStorage.getItem('users'));
            const user = storedUsers.find(u => u.id == userId);
            
            if (!user) {
                alert('User not found!');
                window.location.href = 'user_list.html';
                return;
            }
            
            // Update avatar
            const avatar = document.getElementById('userAvatar');
            avatar.textContent = user.userName.charAt(0).toUpperCase();
            
            // Update basic info
            document.getElementById('userName').textContent = user.userName;
            document.getElementById('userEmail').textContent = user.email;
            
            // Update status badge
            const statusBadge = document.getElementById('userStatus');
            statusBadge.textContent = user.is_activated ? 'Active' : 'Inactive';
            statusBadge.className = `status-badge ${user.is_activated ? 'status-active' : 'status-inactive'}`;
            
            // Update details
            document.getElementById('userId').textContent = user.id;
            
            // Update role badge
            const roleBadge = document.getElementById('userRole');
            roleBadge.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            roleBadge.className = `role-badge role-${user.role}`;
            
            // Update dates
            document.getElementById('createdAt').textContent = formatDate(user.created_at);
            document.getElementById('lastUpdated').textContent = user.updated_at ? 
                formatDate(user.updated_at) : formatDate(user.created_at);
            
            // Update password hash (truncated for display)
            const passwordHash = document.getElementById('passwordHash');
            const truncatedHash = user.password.length > 50 ? 
                user.password.substring(0, 50) + '...' : user.password;
            passwordHash.textContent = truncatedHash;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                weekday: 'long',
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function goBack() {
            window.location.href = 'user_list.html';
        }

        function editUser() {
            alert('Edit user functionality would open a modal or redirect to edit page');
            // In a real application, this would open an edit form
        }

        function toggleActivation() {
            const storedUsers = JSON.parse(localStorage.getItem('users'));
            const userIndex = storedUsers.findIndex(u => u.id == userId);
            
            if (userIndex !== -1) {
                storedUsers[userIndex].is_activated = storedUsers[userIndex].is_activated ? 0 : 1;
                storedUsers[userIndex].updated_at = new Date().toISOString();
                localStorage.setItem('users', JSON.stringify(storedUsers));
                
                // Reload the details
                loadUserDetails();
                
                // Notify parent window if it exists
                if (window.opener && !window.opener.closed) {
                    window.opener.loadUsers();
                }
                
                alert(`User ${storedUsers[userIndex].is_activated ? 'activated' : 'deactivated'} successfully!`);
            }
        }

        function deleteUser() {
            if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                let storedUsers = JSON.parse(localStorage.getItem('users'));
                storedUsers = storedUsers.filter(user => user.id != userId);
                localStorage.setItem('users', JSON.stringify(storedUsers));
                
                // Notify parent window if it exists
                if (window.opener && !window.opener.closed) {
                    window.opener.loadUsers();
                }
                
                alert('User deleted successfully!');
                window.location.href = 'user_list.html';
            }
        }

        // Load user details on page load
        loadUserDetails();

        // Auto-refresh every 10 seconds
        setInterval(loadUserDetails, 10000);
    </script>
</body>
</html>
