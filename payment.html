<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Student Payment Details Submission - PIO Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="material-symbols-outlined text-blue-600 text-3xl">school</span>
                <span class="text-xl font-bold text-gray-800">PIO Prep Portal</span>
            </div>
        </div>
    </nav>
    
    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Payment Verification</h1>
            <p class="text-gray-600 mb-8">Submit your payment details to receive your activation code</p>
            
            <!-- FORM WITH CORRECT ACTION -->
            <form method="POST" action="/payment">
                <div class="space-y-6">
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Student Email *</label>
                        <input 
                            type="email" 
                            name="email"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="your.email@example.com"
                            required
                        >
                    </div>
                    
                    <!-- Payment ID -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Session  ID / Reference *</label>
                        <input 
                            type="text" 
                            name="payment_id"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="e.g., TXN-8392011"
                            required
                        >
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <!-- Transaction Date -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Transaction Date *</label>
                            <input 
                                type="date" 
                                name="transaction_date"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                required
                            >
                        </div>
                        
                        <!-- Payment Method -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method *</label>
                            <select 
                                name="payment_method"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                required
                            >
                                <option value="">Select method</option>
                                <option value="bank_transfer">Bank Transfer</option>
                                <option value="mobile_money">Mobile Money</option>
                                <option value="card">Card Payment</option>
                                <option value="pos">POS Terminal</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <!-- Currency -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Currency</label>
                            <select 
                                name="currency"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            >
                                <option value="NGN" selected>NGN (₦)</option>
                                <option value="USD">USD ($)</option>
                            </select>
                        </div>
                        
                        <!-- Amount -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Amount Paid *</label>
                            <input 
                                type="number" 
                                name="amount"
                                step="0.01"
                                min="0.01"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                placeholder="0.00"
                                required
                            >
                        </div>
                    </div>
                    
                    <!-- Note -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Additional Note (Optional)</label>
                        <textarea 
                            name="note"
                            rows="3"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Any additional information..."
                        ></textarea>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button 
                            type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg"
                        >
                            Submit Payment Details
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        // Set default date to today
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[name="transaction_date"]').value = today;
        });
    </script>
</body>
</html>
