<!DOCTYPE html>
<html>
<head>
    <title>Home Page - Activated User</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #e8f5e9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #2e7d32; }
        button { background: #dc2626; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Welcome Activated User!</h1>
        <p>You have successfully logged in with is_activated = 1</p>
        <p id="userInfo">Loading user info...</p>
        <button onclick="logout()">Logout</button>
        <br><br>
        <a href="/">Go to Login Page</a>
    </div>

    <script>
        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }

        async function checkSession() {
            const res = await fetch('/api/session', { credentials: 'include' });
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('userInfo').innerHTML = `Welcome, ${data.user.userName}!<br>Email: ${data.user.email}<br>Activated: ${data.user.is_activated}`;
            } else {
                window.location.href = '/';
            }
        }

        checkSession();
    </script>
</body>
</html>
